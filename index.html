<!doctype html>
<html lang="zh">
<head>
	<meta charset="utf-8">
	<title>feed reader</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/darkly/bootstrap.min.css" integrity="sha256-qK2XNHPC0d04vpmQHEb050dDEerz1tPtEEZiwzH9PFA=" crossorigin="anonymous">
	<style>
	</style>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<div class="col-6 vh-100" style="overflow-y: scroll;">
				<table class="table table-dark table-hover">
					<tbody id="menu">
					</tbody>
				</table>
			</div>
			<div class="col-6 vh-100" style="overflow-y: scroll;">
				<div id="desc"></div>
			</div>
		</div>
	</div>
	<script type="module">
const urlParams = new URLSearchParams(window.location.search);
const favorites = urlParams.has('favorites'); // An boolean to indicate whether the item source should come from favorites.json. Default is false.
const menu = document.querySelector('tbody#menu');
const desc = document.querySelector('div#desc');
let itemArr = [], itemIndex = 0;
function showItem(itemIndexToShow) {
	menu.children[itemIndex].classList.remove('table-primary');
	itemIndex = itemIndexToShow;
	itemIndex = Math.min(itemIndex, itemArr.length - 1);
	itemIndex = Math.max(itemIndex, 0);
	menu.children[itemIndex].classList.add('table-primary');
	const item = itemArr[itemIndex];
	desc.innerHTML = `${item.pubDate} &nbsp; ${item.category} &nbsp; ${item.title}<br><br>${item.description}`;
	desc.scrollIntoView({ behavior: 'instant' });
}
menu.addEventListener('click', (e) => {
	showItem(e.target.parentNode.rowIndex);
});
menu.addEventListener('dblclick', async (e) => {
	const item = itemArr[e.target.parentNode.rowIndex];
	const response = await fetch('.', {
		method: favorites ? 'DELETE' : 'POST',
		headers: {
			'Content-Type': 'application/json',
		},
		body: JSON.stringify(item),
	});
	console.assert(response.ok);
	const text = await response.text();
	alert(text);
});
document.addEventListener('DOMContentLoaded', async () => {
	if (favorites) {
		const response = await fetch('http://localhost:12080/feed/favorites.json');
		console.assert(response.ok);
		itemArr = await response.json();
	} else {
		const response = await fetch('http://localhost:12080');
		console.assert(response.ok);
		const text = await response.text();
		const lines = text.split('\n').slice(17, -3);
		console.assert(lines[0] === '\t\t<item>');
		console.assert(lines[lines.length - 1] === '\t\t</item>');
		for (let itemBegIndex = 0, itemEndIndex; itemBegIndex < lines.length; itemBegIndex = itemEndIndex + 1) {
			for (itemEndIndex = itemBegIndex + 9; lines[itemEndIndex] !== '\t\t</item>';  ++itemEndIndex);
			itemArr.push({
				title: lines[itemBegIndex + 1].slice(19, -11), // Filter out \t\t\t<title><![CDATA[ and ]]></title>
				category: lines[itemBegIndex + 5].slice(22, -14), // Filter out <category><![CDATA[ and ]]></category>
				pubDate: lines[itemBegIndex + 6].slice(12, -10), // Filter out \t\t\t<pubDate> and </pubDate>
				description: itemEndIndex === itemBegIndex + 9 ? lines[itemBegIndex + 8].slice(25, -17) : [ // The <description> tag can span multiple lines.
					lines[itemBegIndex + 8].slice(25), // Filter out \t\t\t<description><![CDATA[
					...lines.slice(itemBegIndex + 9, itemEndIndex - 1),
					lines[itemEndIndex - 1].slice(0, -17), // Filter out ]]></description>
				].join(''),
			});
		}
	}
	for (const item of itemArr) {
		const tr = document.createElement('tr');
		['pubDate', 'category', 'title'].forEach(key => {
			const td = document.createElement('td');
			td.innerText = item[key];
			tr.appendChild(td);
		});
		menu.appendChild(tr);
	}
	showItem(0);
});
document.addEventListener('keydown', (e) => {
	switch (e.key) {
		case 'ArrowLeft':
			showItem(itemIndex - 1);
			break;
		case 'ArrowRight':
			showItem(itemIndex + 1);
			break;
	}
});
	</script>
</body>
</html>
